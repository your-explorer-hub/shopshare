<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShopShare — Legal</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f7f5ff;
      color: #1a1a2e;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      background: linear-gradient(135deg, #7C4DFF, #9C27B0);
      color: white;
      padding: 40px 24px 32px;
      text-align: center;
    }
    header .logo { font-size: 2rem; font-weight: 800; letter-spacing: -0.5px; }
    header .logo span { opacity: 0.75; font-weight: 400; font-size: 1rem; display: block; margin-top: 4px; }
    main {
      max-width: 640px;
      margin: 48px auto;
      padding: 0 24px;
      flex: 1;
    }
    h2 { font-size: 1.1rem; color: #5e35b1; margin-bottom: 24px; font-weight: 600; }
    .card-grid { display: grid; gap: 16px; }
    .card {
      background: white;
      border-radius: 16px;
      padding: 28px 24px;
      text-decoration: none;
      color: inherit;
      border: 1.5px solid #ede7f6;
      display: flex;
      align-items: center;
      gap: 20px;
      transition: box-shadow 0.15s, transform 0.15s;
    }
    .card:hover { box-shadow: 0 6px 24px rgba(124,77,255,0.12); transform: translateY(-2px); }
    .card .icon {
      font-size: 2rem;
      width: 52px; height: 52px;
      background: #f3e5f5;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .card h3 { font-size: 1.05rem; font-weight: 700; margin-bottom: 4px; }
    .card p { font-size: 0.875rem; color: #666; line-height: 1.5; }
    footer {
      text-align: center;
      padding: 24px;
      font-size: 0.8rem;
      color: #999;
    }
    footer a { color: #7C4DFF; text-decoration: none; }
  </style>
</head>
<body>
  <header>
    <div class="logo">🛒 ShopShare <span>Collaborative Shopping Lists</span></div>
  </header>
  <main>
    <h2>Legal Documents</h2>
    <div class="card-grid">
      <a class="card" href="privacy.html">
        <div class="icon">🔒</div>
        <div>
          <h3>Privacy Policy</h3>
          <p>How we collect, use, and protect your personal data.</p>
        </div>
      </a>
      <a class="card" href="terms.html">
        <div class="icon">📄</div>
        <div>
          <h3>Terms of Service</h3>
          <p>Rules and guidelines for using ShopShare.</p>
        </div>
      </a>
    </div>
  </main>
  <footer>
    Questions? <a href="mailto:ss.yourexplorerhub@gmail.com">ss.yourexplorerhub@gmail.com</a><br/>
    &copy; 2026 ShopShare. All rights reserved.
  </footer>
</body>
</html>
